name: _diag

# Throwaway: strace `glide test` on the ubuntu runner to find where run_test
# segfaults at startup (not reproducible under WSL). Delete after diagnosis.
on:
  push:
    branches: [main]

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y build-essential zlib1g-dev strace file
      - run: bash tools/install_toolchain.sh
      - run: |
          set -e
          cc bootstrap/seed/bootstrap.c -o glide_seed -O2 -lpthread -lm -lz
          ./glide_seed build bootstrap/main.glide -o glide
          file ./glide
          ./glide version
      - run: ./glide target add x86_64-linux-musl
      - name: strace the directory test path (the crashing one)
        run: |
          set +e
          echo "=== single file (works) ==="
          "$PWD/glide" test tests/arena_test.glide >/dev/null 2>&1; echo "single rc=$?"
          echo "=== directory (crashes in CI) ==="
          "$PWD/glide" test tests >/dev/null 2>&1; echo "dir rc=$?"
          echo "=== strace the directory path ==="
          strace -f -tt "$PWD/glide" test tests >/dev/null 2> strace.log
          echo "strace rc=$?"
          echo "--- killing signal + context ---"
          grep -n "killed by\|si_code=SEGV\|si_code=SI_\|si_addr" strace.log | head -20
          echo "--- last 50 lines ---"
          tail -50 strace.log | cut -c1-200
