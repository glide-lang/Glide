name: ci

# Build the compiler from the seed and run the full regression suite
# (tools/test_all.sh: unit tests + LSP smoke + e2e smokes) on every push to
# main and every PR, across Linux / Windows / macOS. Release artifacts are
# handled separately by release.yml.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  name: linux-x86_64,   triple: x86_64-linux-musl }
          - { os: windows-latest, name: windows-x86_64,  triple: x86_64-windows-gnu }
          - { os: macos-latest,   name: macos-aarch64,   triple: aarch64-macos-none }
    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-zlib
            mingw-w64-ucrt-x86_64-python
            curl zip unzip tar gzip

      - name: Install build deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zlib1g-dev curl python3 python-is-python3

      - name: Fetch Zig toolchain
        run: bash tools/install_toolchain.sh

      - name: Bootstrap compiler from a published release
        # Glide is self-hosting, so there is no checked-in C seed: download a
        # previously published release binary and use it to build the current
        # sources. The release archive bundles its own runtime/zig, but we run
        # from the repo root so it uses the toolchain fetched above. Bump
        # BOOT_TAG only when an older release can no longer compile `main`.
        run: |
          set -e
          BOOT_TAG=v0.4.0
          ver="${BOOT_TAG#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${BOOT_TAG}"
          mkdir -p .boot
          if [ "${{ runner.os }}" = "Windows" ]; then
            asset="glide-${{ matrix.name }}-${ver}.zip"
            curl -fL -o ".boot/${asset}" "${base}/${asset}"
            unzip -q ".boot/${asset}" -d .boot
            cp "$(find .boot -name glide.exe | head -1)" glide_boot.exe
            ./glide_boot.exe build bootstrap/main.glide -o glide.exe
            ./glide.exe version
          else
            asset="glide-${{ matrix.name }}-${ver}.tar.gz"
            curl -fL -o ".boot/${asset}" "${base}/${asset}"
            tar -xzf ".boot/${asset}" -C .boot
            cp "$(find .boot -name glide -type f | head -1)" glide_boot
            chmod +x glide_boot
            ./glide_boot build bootstrap/main.glide -o glide
            ./glide version
          fi

      - name: Install host sysroot
        # A lib-linking `glide build` auto-promotes to the host triple and links
        # the sysroot's bundled openssl / zlib (and ngtcp2 / nghttp3 where the
        # platform ships them), so no system -dev packages are needed.
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then ./glide.exe target add ${{ matrix.triple }}; \
          else ./glide target add ${{ matrix.triple }}; fi

      - name: Skip HTTP/3 test where ngtcp2 is unavailable
        # The Linux (musl) / macOS sysroots don't ship a static
        # ngtcp2_crypto_ossl (Alpine only has the gnutls variant), so the
        # HTTP/3 test can't link there. Run it only on Windows for now.
        if: matrix.os != 'windows-latest'
        run: |
          [ -f tests/http_h3_test.glide ] && mv tests/http_h3_test.glide tests/http_h3_test.glide.skip || true

      - name: Run regression suite (tools/test_all.sh)
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then GLIDE="$PWD/glide.exe" bash tools/test_all.sh; \
          else GLIDE="$PWD/glide" bash tools/test_all.sh; fi
