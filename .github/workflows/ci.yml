name: ci

# Build the compiler from the seed and run the full regression suite
# (tools/test_all.sh: unit tests + LSP smoke + e2e smokes) on every push to
# main and every PR, across Linux / Windows / macOS. Release artifacts are
# handled separately by release.yml.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Windows Python defaults to a legacy console codec that can't encode the
# emoji the LSP smoke prints; force UTF-8 everywhere (harmless on Linux/macOS).
env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  name: linux-x86_64,   triple: x86_64-linux-musl }
          - { os: windows-latest, name: windows-x86_64,  triple: x86_64-windows-gnu }
          - { os: macos-latest,   name: macos-aarch64,   triple: aarch64-macos-none }
    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-python
            curl zip unzip tar gzip

      - name: Install build deps (Linux)
        # clang + lld drive cross/promoted builds against the sysroot's
        # libc/ tree — the cross backend since the zig removal. No libssl-dev:
        # the 0.9.0 seed is pure-Glide and links no OpenSSL.
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang lld curl python3 python-is-python3

      - name: Bootstrap the compiler from the released C
        # Glide is self-hosting; rather than seed from a previous *binary*
        # (which can't compile syntax newer than itself), the release ships the
        # compiler's own emitted C. Each platform rebuilds it with just its
        # native C compiler — no OpenSSL (the seed is pure-Glide since 0.9.0),
        # no per-platform Glide seed. The C is platform-independent (the emitted
        # source carries the __APPLE__/_WIN32 feature guards), so one file
        # bootstraps every OS. BOOT_VER tracks the release the C was emitted
        # from; it must be >= the first pure-Glide release (0.9.0).
        run: |
          set -e
          BOOT_VER=0.9.0
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${BOOT_VER}"
          curl -fL -o glide-boot.c "${base}/glide-bootstrap-${BOOT_VER}.c"
          CF="-O2 -w -fwrapv -fno-omit-frame-pointer -Wno-error=implicit-function-declaration"
          if [ "${{ runner.os }}" = "Windows" ]; then
            gcc glide-boot.c -o glide.exe $CF -lws2_32 -lmswsock -ldbghelp -lpsapi -lbcrypt -lcrypt32 -lpthread -lm
            ./glide.exe version
          elif [ "${{ runner.os }}" = "macOS" ]; then
            clang glide-boot.c -o glide $CF -lpthread -lm
            ./glide version
          else
            cc glide-boot.c -o glide $CF -D_GNU_SOURCE -ldl -lpthread -lm
            ./glide version
          fi

      - name: Cache linux sysroot v2
        if: matrix.os == 'ubuntu-latest'
        id: sysroot-cache
        uses: actions/cache@v4
        with:
          path: dist/glide-sysroot-x86_64-linux-musl-ci.tar.gz
          key: sysroot-v2-${{ matrix.triple }}-${{ hashFiles('tools/build_sysroot.sh') }}

      - name: Build linux sysroot
        # Built in-workflow instead of `glide target add`: exercises the
        # release sysroot pipeline on every PR that touches it. Post-0.9 this
        # is just the musl libc/ tree from Alpine APKs — no Docker, no
        # third-party libs.
        if: matrix.os == 'ubuntu-latest' && steps.sysroot-cache.outputs.cache-hit != 'true'
        run: bash tools/build_sysroot.sh --target=${{ matrix.triple }} --version=ci

      - name: Install host sysroot
        # A bare `glide build` auto-promotes to the host triple and links
        # statically against the sysroot's musl libc/ tree, so no system
        # -dev packages are needed.
        #
        # Windows/macOS fetch a PINNED published sysroot asset directly
        # instead of `glide target add`: the compiler's SYSROOT_VERSION may
        # already point at the NEXT release (bumped in the release-prep
        # commit), whose assets don't exist until the tag's release run
        # publishes them — `target add` would 404 on every pre-tag push.
        # The native tier only needs include/ + lib/, which any published
        # sysroot carries. Bump CI_SYSROOT when a newer asset is useful.
        run: |
          CI_SYSROOT=0.6.1
          if [ "${{ runner.os }}" = "Linux" ]; then
            mkdir -p ~/.glide/targets/${{ matrix.triple }}
            tar -xzf dist/glide-sysroot-x86_64-linux-musl-ci.tar.gz -C ~/.glide/targets/${{ matrix.triple }}
          else
            if [ "${{ runner.os }}" = "Windows" ]; then
              HOMEDIR="$(cygpath -u "$USERPROFILE")"
            else
              HOMEDIR="$HOME"
            fi
            DEST="${HOMEDIR}/.glide/targets/${{ matrix.triple }}"
            mkdir -p "$DEST"
            curl -fL -o sysroot.tar.gz "https://github.com/${GITHUB_REPOSITORY}/releases/download/v${CI_SYSROOT}/glide-sysroot-${{ matrix.triple }}-${CI_SYSROOT}.tar.gz"
            tar -xzf sysroot.tar.gz -C "$DEST"
          fi

      - name: Self-host - rebuild the compiler from HEAD sources
        # The emit-C bootstrap above only proves the RELEASED compiler builds;
        # the suite must run against the compiler built from THIS checkout or
        # compiler changes are never exercised (the binary-seed flow always
        # did this and the emit-C migration dropped it). Build to a temp name
        # first: Windows can't overwrite the running glide.exe in place.
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then EXE=.exe; else EXE=; fi
          ./glide$EXE build bootstrap/main.glide -o glide_head$EXE
          ./glide_head$EXE version
          mv -f glide_head$EXE glide$EXE

      - name: Skip the live-TLS test on Windows
        # net_tls_test opens a real TLS connection to example.com. The compiler
        # binary builds and runs on Windows, but the pure-Glide net/socket stack
        # has never had a working Windows build and isn't validated there yet;
        # Linux/macOS cover this path. (Windows net porting is a follow-up.)
        if: matrix.os == 'windows-latest'
        run: |
          [ -f tests/net_tls_test.glide ] && mv tests/net_tls_test.glide tests/net_tls_test.glide.skip || true

      - name: Run regression suite (tools/test_all.sh)
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then GLIDE="$PWD/glide.exe" bash tools/test_all.sh; \
          else GLIDE="$PWD/glide" bash tools/test_all.sh; fi

  # Undefined-behavior sanitizer pass over the emitted C. The zig-clang
  # backend used to trap UB incidentally (it caught real stdlib bugs);
  # with zig gone this job does it explicitly and deliberately.
  ubsan:
    name: linux-ubsan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        # The UBSan run stays on the host-cc path (no sysroot) — sanitizer
        # runtimes for the cross musl target aren't shipped. No libssl-dev:
        # the boot binary is a self-contained musl-static 0.9.x and the pure-
        # Glide test binaries link no OpenSSL.
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang lld curl python3 python-is-python3

      - name: Bootstrap compiler from a published release
        run: |
          set -e
          BOOT_TAG=v0.9.0
          ver="${BOOT_TAG#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${BOOT_TAG}"
          mkdir -p .boot
          asset="glide-linux-x86_64-${ver}.tar.gz"
          curl -fL -o ".boot/${asset}" "${base}/${asset}"
          tar -xzf ".boot/${asset}" -C .boot
          cp "$(find .boot -name glide -type f | head -1)" glide_boot
          chmod +x glide_boot
          ./glide_boot build bootstrap/main.glide -o glide
          ./glide version

      - name: Run test suite under UBSan
        run: |
          export CC=clang
          # `-fsanitize` in the flags makes glide skip the static-musl sysroot
          # promotion (sanitizer runtimes resolve libc through dlsym(RTLD_NEXT),
          # which can't work in a fully-static binary), so the test binaries
          # link dynamically against the system glibc — the environment clang's
          # UBSan runtime actually supports that.
          export GLIDE_CFLAGS="-fsanitize=undefined -fno-sanitize-recover=undefined -g"
          export GLIDE_LDFLAGS="-fsanitize=undefined"
          ./glide test tests
