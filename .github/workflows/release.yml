name: release

# Build the release artifacts on native runners (so macOS / aarch64 get a
# real toolchain instead of a cross-build from one host) and attach them to
# the GitHub release for the tag.
#
# Each runner also produces the sysroot tarball for its own target — the
# sysroot is just (headers + static .a libs) for that triple, so it's
# arch-OS specific but host-independent. End users pull whatever combo
# matches their target via `glide target add <triple>`.
#
# Fires on a pushed `v*` tag, or manually via the Actions tab / `gh workflow
# run release.yml -f tag=v0.2.0` to (re)build for an existing release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for and upload to (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-13 (Intel) was dropped — GitHub has deprecated that runner
        # image and jobs sit in the queue indefinitely. Apple Silicon macs are
        # covered by macos-aarch64; Intel-mac users can use that under Rosetta
        # or build from source.
        include:
          - { os: ubuntu-latest,    name: linux-x86_64,   sysroot_triple: x86_64-linux-musl }
          - { os: ubuntu-24.04-arm, name: linux-aarch64,  sysroot_triple: aarch64-linux-musl }
          - { os: macos-latest,     name: macos-aarch64,  sysroot_triple: aarch64-macos-none }
          - { os: windows-latest,   name: windows-x86_64, sysroot_triple: x86_64-windows-gnu }
    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          # mingw-w64-ucrt-x86_64-openssl + ngtcp2 + nghttp3 give us the
          # static .a files build_sysroot.sh copies into the Windows
          # sysroot tarball. Without them the Windows sysroot would
          # ship without TLS / HTTP/3.
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-zlib
            mingw-w64-ucrt-x86_64-ngtcp2
            mingw-w64-ucrt-x86_64-nghttp3
            zip unzip

      - name: Setup macOS toolchain (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          set -e
          # brew openssl@3 + zlib give us the static .a + headers
          # build_sysroot.sh stages into the macOS sysroot. nghttp3 +
          # ngtcp2 from brew round out the HTTP/3 stack.
          brew update >/dev/null
          brew install openssl@3 zlib nghttp3 ngtcp2 || true

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Fetch Zig toolchain
        run: bash tools/install_toolchain.sh

      - name: Build seed + compiler
        run: |
          set -e
          # The compiler links zlib (compress / fetch decompression). The final
          # `glide build` auto-links what it needs; the manual seed cc must spell
          # out -lz (and -lpthread -lm).
          if [ "${{ runner.os }}" = "Windows" ]; then
            gcc bootstrap/seed/bootstrap.c -o glide_seed.exe -O2 -lpthread -lm -lz \
                -lws2_32 -lmswsock -ldbghelp -lpsapi
            ./glide_seed.exe build bootstrap/main.glide -o glide.exe
          else
            cc bootstrap/seed/bootstrap.c -o glide_seed -O2 -lpthread -lm -lz
            ./glide_seed build bootstrap/main.glide -o glide
          fi

      - name: Package release artifact
        run: VERSION="${{ steps.ver.outputs.version }}" bash tools/build_release.sh

      - name: Build sysroot for ${{ matrix.sysroot_triple }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}" \
            bash tools/build_sysroot.sh --target=${{ matrix.sysroot_triple }}

      - name: Verify the binary is non-empty
        run: |
          set -e
          d="dist/glide-${{ matrix.name }}-${{ steps.ver.outputs.version }}"
          bin="$d/glide"; [ "${{ runner.os }}" = "Windows" ] && bin="$d/glide.exe"
          test -s "$bin" || { echo "::error::built binary is missing/empty: $bin"; exit 1; }
          ls -la "$bin"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            dist/glide-${{ matrix.name }}-${{ steps.ver.outputs.version }}.tar.gz
            dist/glide-${{ matrix.name }}-${{ steps.ver.outputs.version }}.zip
            dist/glide-sysroot-${{ matrix.sysroot_triple }}-${{ steps.ver.outputs.version }}.tar.gz
          fail_on_unmatched_files: false
