name: release

# Build the release artifacts on native runners (so macOS / aarch64 get a
# real toolchain instead of a cross-build from one host) and attach them to
# the GitHub release for the tag.
#
# Two phases:
#   1. `sysroots` — each runner builds the sysroot for its native triple
#      (the only way to get a working static OpenSSL / ngtcp2 / nghttp3
#      bundle for Windows + macOS without painful cross-compile tricks).
#      Each sysroot is uploaded both as a release asset (so users can
#      `glide target add <triple>`) AND as a workflow artifact so the
#      bundle job below can pull all four in.
#   2. `release` — each runner builds the small glide binary + the
#      fully-self-contained bundle binary. The bundle has every sysroot
#      + the Zig toolchain + the Glide stdlib baked in, so `glide build`
#      for any target works offline from a fresh install.
#
# Fires on a pushed `v*` tag, or manually via the Actions tab / `gh workflow
# run release.yml -f tag=v0.3.2` to (re)build for an existing release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for and upload to (e.g. v0.3.2)'
        required: true

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------
  # Phase 1: every runner builds the sysroot for its own triple.
  # ---------------------------------------------------------------------
  sysroots:
    name: sysroot-${{ matrix.triple }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    triple: x86_64-linux-musl }
          - { os: ubuntu-24.04-arm, triple: aarch64-linux-musl }
          - { os: macos-latest,     triple: aarch64-macos-none }
          - { os: windows-latest,   triple: x86_64-windows-gnu }
    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-zlib
            mingw-w64-ucrt-x86_64-ngtcp2
            mingw-w64-ucrt-x86_64-nghttp3
            tar gzip

      - name: Setup macOS toolchain (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          set -e
          brew update >/dev/null
          brew install openssl@3 zlib
          brew install nghttp3 ngtcp2 || true

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Build sysroot
        run: |
          VERSION="${{ steps.ver.outputs.version }}" \
            bash tools/build_sysroot.sh --target=${{ matrix.triple }}

      - name: Upload sysroot as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysroot-${{ matrix.triple }}
          path: dist/glide-sysroot-${{ matrix.triple }}-${{ steps.ver.outputs.version }}.tar.gz
          retention-days: 1

  # ---------------------------------------------------------------------
  # Phase 2: each runner produces both the small glide binary AND the
  # bundle binary (with every sysroot, src/, and Zig baked in).
  # ---------------------------------------------------------------------
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: sysroots
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    name: linux-x86_64,   triple: x86_64-linux-musl }
          - { os: ubuntu-24.04-arm, name: linux-aarch64,  triple: aarch64-linux-musl }
          - { os: macos-latest,     name: macos-aarch64,  triple: aarch64-macos-none }
          - { os: windows-latest,   name: windows-x86_64, triple: x86_64-windows-gnu }
    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-zlib
            zip unzip tar gzip

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Fetch Zig toolchain
        run: bash tools/install_toolchain.sh

      - name: Bootstrap compiler from a published release
        # Glide is self-hosting (no checked-in C seed): download a previously
        # published release binary and build the current sources with it. Bump
        # BOOT_TAG only when an older release can no longer compile `main`.
        run: |
          set -e
          BOOT_TAG=v0.4.1
          ver="${BOOT_TAG#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${BOOT_TAG}"
          mkdir -p .boot
          if [ "${{ runner.os }}" = "Windows" ]; then
            asset="glide-${{ matrix.name }}-${ver}.zip"
            curl -fL -o ".boot/${asset}" "${base}/${asset}"
            unzip -q ".boot/${asset}" -d .boot
            cp "$(find .boot -name glide.exe | head -1)" glide_boot.exe
            ./glide_boot.exe build bootstrap/main.glide -o glide.exe
          else
            asset="glide-${{ matrix.name }}-${ver}.tar.gz"
            curl -fL -o ".boot/${asset}" "${base}/${asset}"
            tar -xzf ".boot/${asset}" -C .boot
            cp "$(find .boot -name glide -type f | head -1)" glide_boot
            chmod +x glide_boot
            ./glide_boot build bootstrap/main.glide -o glide
          fi

      - name: Package small release artifact
        run: VERSION="${{ steps.ver.outputs.version }}" bash tools/build_release.sh

      - name: Download all sysroot artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/sysroots
          pattern: sysroot-*
          merge-multiple: true

      - name: Stage sysroots into dist/
        run: |
          set -e
          mkdir -p dist
          mv dist/sysroots/*.tar.gz dist/
          rmdir dist/sysroots
          ls -lh dist/glide-sysroot-*.tar.gz

      - name: Build src.tar.gz for embedding
        run: |
          tar -czf dist/src-${{ steps.ver.outputs.version }}.tar.gz src
          ls -lh dist/src-${{ steps.ver.outputs.version }}.tar.gz

      - name: Build zig.tar.gz for embedding
        run: |
          set -e
          # Tarball the bundled Zig we just fetched. Embedded as-is into
          # the bundle binary so the first build on a fresh install
          # self-extracts the toolchain.
          tar -czf dist/zig-${{ steps.ver.outputs.version }}.tar.gz -C runtime zig
          ls -lh dist/zig-${{ steps.ver.outputs.version }}.tar.gz

      - name: Generate embedded blobs
        run: |
          VER="${{ steps.ver.outputs.version }}"
          bash tools/gen_embedded_blobs.sh \
            --zig=dist/zig-${VER}.tar.gz \
            --src=dist/src-${VER}.tar.gz \
            --sysroot=dist/glide-sysroot-x86_64-linux-musl-${VER}.tar.gz \
            --sysroot=dist/glide-sysroot-aarch64-linux-musl-${VER}.tar.gz \
            --sysroot=dist/glide-sysroot-x86_64-windows-gnu-${VER}.tar.gz \
            --sysroot=dist/glide-sysroot-aarch64-macos-none-${VER}.tar.gz \
            --out=bootstrap/embed.glide

      - name: Install host sysroot for the bundle build
        run: |
          set -e
          # Building the bundle binary compiles main.glide, which links
          # openssl / zlib / ngtcp2 / nghttp3. The plug-and-play host-build
          # path needs the host triple's sysroot installed in
          # <home>/.glide/targets/ — otherwise it tries to fetch it from the
          # release page, which 404s because THIS workflow is what
          # publishes it. Stage it from the artifact we already have so the
          # bundle binary links statically against the right libs.
          #
          # The native glide binary resolves home via USERPROFILE on
          # Windows and HOME elsewhere — match that exactly so it finds the
          # sysroot we lay down (MSYS2 $HOME can differ from USERPROFILE).
          VER="${{ steps.ver.outputs.version }}"
          TRIPLE="${{ matrix.triple }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            HOMEDIR="$(cygpath -u "$USERPROFILE")"
          else
            HOMEDIR="$HOME"
          fi
          DEST="${HOMEDIR}/.glide/targets/${TRIPLE}"
          mkdir -p "$DEST"
          tar -xzf "dist/glide-sysroot-${TRIPLE}-${VER}.tar.gz" -C "$DEST"
          echo "installed sysroot for ${TRIPLE} at ${DEST}:"
          ls -lh "$DEST/lib" || true

      - name: Build bundle binary
        run: |
          set -e
          mkdir -p dist/bundle
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./glide.exe build bootstrap/main.glide -o dist/bundle/glide.exe
          else
            ./glide build bootstrap/main.glide -o dist/bundle/glide
          fi
          ls -lh dist/bundle/

      - name: Package bundle release artifact
        run: |
          set -e
          VER="${{ steps.ver.outputs.version }}"
          NAME="${{ matrix.name }}"
          dir="glide-bundle-${NAME}-${VER}"
          mkdir -p "dist/${dir}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/bundle/glide.exe "dist/${dir}/"
          else
            cp dist/bundle/glide "dist/${dir}/"
          fi
          cp LICENSE README.md "dist/${dir}/" 2>/dev/null || true
          ( cd dist && tar -czf "${dir}.tar.gz" "${dir}" )
          if [ "${{ runner.os }}" = "Windows" ]; then
            ( cd dist && zip -r "${dir}.zip" "${dir}" )
          fi
          ls -lh dist/${dir}.*

      - name: Verify the small binary is non-empty
        run: |
          set -e
          d="dist/glide-${{ matrix.name }}-${{ steps.ver.outputs.version }}"
          bin="$d/glide"; [ "${{ runner.os }}" = "Windows" ] && bin="$d/glide.exe"
          test -s "$bin" || { echo "::error::built binary is missing/empty: $bin"; exit 1; }
          ls -la "$bin"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            dist/glide-${{ matrix.name }}-${{ steps.ver.outputs.version }}.tar.gz
            dist/glide-${{ matrix.name }}-${{ steps.ver.outputs.version }}.zip
            dist/glide-sysroot-${{ matrix.triple }}-${{ steps.ver.outputs.version }}.tar.gz
            dist/glide-bundle-${{ matrix.name }}-${{ steps.ver.outputs.version }}.tar.gz
            dist/glide-bundle-${{ matrix.name }}-${{ steps.ver.outputs.version }}.zip
          fail_on_unmatched_files: false
